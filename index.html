<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anyways Transit Tracker</title>
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #BB86FC;
            --text: #f0f0f0;
            --background: #121212;
            --surface: #1e1e1e;
            --border: #333;
            --bus: #f5a623;
            --train: #4a9eff;
            --ferry: #50e3c2;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Outfit', sans-serif;
            background-color: var(--background);
            color: var(--text);
            overflow: hidden;
        }

        #app {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        #sidebar {
            width: 350px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 10;
            box-shadow: 2px 0 10px rgba(0,0,0,0.5);
        }

        #map-container {
            flex: 1;
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        .header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }

        .header h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 700;
            color: var(--accent);
        }

        .header p {
            margin: 5px 0 0;
            font-size: 14px;
            color: #888;
        }

        .filters {
            padding: 15px 20px;
            display: flex;
            gap: 10px;
            border-bottom: 1px solid var(--border);
        }

        .filter-btn {
            flex: 1;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--background);
            color: var(--text);
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .filter-btn.active[data-type="BUS"] { border-color: var(--bus); background: rgba(245, 166, 35, 0.15); }
        .filter-btn.active[data-type="TRAIN"] { border-color: var(--train); background: rgba(74, 158, 255, 0.15); }
        .filter-btn.active[data-type="FERRY"] { border-color: var(--ferry); background: rgba(80, 227, 194, 0.15); }

        .filter-btn:not(.active) { opacity: 0.5; }

        .vehicle-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
        }

        .vehicle-item {
            padding: 12px 20px;
            border-bottom: 1px solid #2a2a2a;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .vehicle-item:hover {
            background: #2a2a2a;
        }

        .vehicle-item.selected {
            background: rgba(187, 134, 252, 0.1);
            border-left: 4px solid var(--accent);
        }

        .vehicle-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .icon-bus { background: rgba(245, 166, 35, 0.2); color: var(--bus); }
        .icon-train { background: rgba(74, 158, 255, 0.2); color: var(--train); }
        .icon-ferry { background: rgba(80, 227, 194, 0.2); color: var(--ferry); }

        .vehicle-info {
            flex: 1;
            min-width: 0;
        }

        .vehicle-route {
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 2px;
        }

        .vehicle-headsign {
            font-size: 13px;
            color: #aaa;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .vehicle-meta {
            text-align: right;
            font-size: 12px;
            color: #888;
        }

        #detail-panel {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--surface);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: none;
            width: 400px;
            z-index: 100;
            border: 1px solid var(--border);
        }

        #detail-panel.visible { display: block; }

        .detail-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .detail-title h2 { margin: 0; font-size: 20px; }
        .detail-title p { margin: 5px 0 0; color: #aaa; }

        .close-btn {
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .stat-card {
            background: var(--background);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .stat-label { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 15px; font-weight: 600; margin-top: 2px; }

        .loading-overlay {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 100;
            border: 1px solid var(--border);
        }

        .pulse {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse-anim 1.5s infinite;
        }

        @keyframes pulse-anim {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Marker styling */
        .marker {
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="app">
    <div id="sidebar">
        <div class="header">
            <h1>ANYWAYS.</h1>
            <p id="stats-summary">Initializing tracker...</p>
        </div>
        <div class="filters">
            <button class="filter-btn active" data-type="BUS" onclick="toggleFilter('BUS')">
                <span>🚌</span>
                <span>Buses</span>
            </button>
            <button class="filter-btn active" data-type="TRAIN" onclick="toggleFilter('TRAIN')">
                <span>🚆</span>
                <span>Trains</span>
            </button>
            <button class="filter-btn active" data-type="FERRY" onclick="toggleFilter('FERRY')">
                <span>⛴️</span>
                <span>Ferries</span>
            </button>
        </div>
        <div class="vehicle-list" id="vehicle-list">
            <!-- Vehicles will be populated here -->
        </div>
    </div>
    <div id="map-container">
        <div id="map"></div>
        <div class="loading-overlay" id="loading-indicator">
            <div class="pulse"></div>
            <span id="loading-text">Live</span>
        </div>
        <div id="detail-panel">
            <div class="detail-header">
                <div class="detail-title">
                    <h2 id="det-route">Route</h2>
                    <p id="det-head">Destination</p>
                </div>
                <button class="close-btn" onclick="closeDetail()">×</button>
            </div>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Speed</div>
                    <div class="stat-value" id="det-speed">—</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Heading</div>
                    <div class="stat-value" id="det-heading">—</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Vehicle ID</div>
                    <div class="stat-value" id="det-id">—</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Coordinates</div>
                    <div class="stat-value" id="det-coords">—</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Configuration extracted from Anyways.html
    const MAPBOX_TOKEN = 'pk.eyJ1IjoiYWFyb25jdXRyZXNzIiwiYSI6ImNtMDBmazFneDE1MzAybG80bW5mNm93d3YifQ.OfRdyqKCe7Pdz6DezfAs4Q';
    const OTP_ENDPOINT = 'https://otp.anyways.kontour.io/otp/gtfs/v1';
    const APP_TOKEN = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJhbnl3YXlzLXdlYiIsInN1YiI6IndlYi1jbGllbnQiLCJpYXQiOjE3Nzg2NjQ4MzEsImV4cCI6MTc3ODY2ODQzMX0.gcMHreRz9RjC2do7FMl1VPCnWhkC4Spy_KnBFclPVlo';

    // State
    let map;
    let vehicles = [];
    let markers = {};
    let selectedId = null;
    let activeFilters = { BUS: true, TRAIN: true, FERRY: true };
    let refreshInterval;

    // Mapbox setup
    mapboxgl.accessToken = MAPBOX_TOKEN;
    
    function initMap() {
        map = new mapboxgl.Map({
            container: 'map',
            style: 'mapbox://styles/mapbox/dark-v11',
            center: [115.8605, -31.9505], // Perth
            zoom: 12
        });

        map.addControl(new mapboxgl.NavigationControl());

        map.on('load', () => {
            fetchVehicles();
            refreshInterval = setInterval(fetchVehicles, 10000);
        });
    }

    // GraphQL Query
    const VEHICLE_QUERY = `
    query GetVehicles($minLat: Float!, $minLon: Float!, $maxLat: Float!, $maxLon: Float!) {
      vehiclePositions(
        boundingBox: {
          minLat: $minLat
          minLon: $minLon
          maxLat: $maxLat
          maxLon: $maxLon
        }
      ) {
        vehicleId
        lat
        lon
        speed
        heading
        label
        trip {
          gtfsId
          route {
            shortName
            longName
            mode
            color
          }
          tripHeadsign
        }
      }
    }`;

    async function fetchVehicles() {
        const bounds = map.getBounds();
        const variables = {
            minLat: bounds.getSouth(),
            minLon: bounds.getWest(),
            maxLat: bounds.getNorth(),
            maxLon: bounds.getEast()
        };

        const loadingText = document.getElementById('loading-text');
        loadingText.textContent = 'Updating...';

        try {
            const response = await fetch(OTP_ENDPOINT, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-app-token': APP_TOKEN
                },
                body: JSON.stringify({
                    query: VEHICLE_QUERY,
                    variables: variables
                })
            });

            if (!response.ok) throw new Error('Network response was not ok');
            const data = await response.json();
            
            if (data.data && data.data.vehiclePositions) {
                updateVehicles(data.data.vehiclePositions);
            }
            loadingText.textContent = 'Live';
        } catch (error) {
            console.error('Fetch error:', error);
            loadingText.textContent = 'Offline';
        }
    }

    function updateVehicles(newPositions) {
        // Map data to local format
        vehicles = newPositions.map(p => {
            let type = 'BUS';
            const mode = p.trip?.route?.mode;
            if (['RAIL', 'SUBWAY', 'TRAM'].includes(mode)) type = 'TRAIN';
            if (mode === 'FERRY') type = 'FERRY';

            return {
                id: p.vehicleId || p.label,
                lat: p.lat,
                lon: p.lon,
                speed: p.speed,
                heading: p.heading,
                route: p.trip?.route?.shortName || p.label || '?',
                headsign: p.trip?.tripHeadsign || p.trip?.route?.longName || 'Unknown',
                type: type,
                color: p.trip?.route?.color || (type === 'BUS' ? '#f5a623' : type === 'TRAIN' ? '#4a9eff' : '#50e3c2')
            };
        });

        renderList();
        updateMarkers();
        updateSummary();
    }

    function updateSummary() {
        const counts = { BUS: 0, TRAIN: 0, FERRY: 0 };
        vehicles.forEach(v => { if(counts[v.type] !== undefined) counts[v.type]++; });
        document.getElementById('stats-summary').textContent = 
            `${vehicles.length} vehicles detected (${counts.BUS} buses, ${counts.TRAIN} trains, ${counts.FERRY} ferries)`;
    }

    function toggleFilter(type) {
        activeFilters[type] = !activeFilters[type];
        document.querySelector(`.filter-btn[data-type="${type}"]`).classList.toggle('active');
        renderList();
        updateMarkers();
    }

    function renderList() {
        const list = document.getElementById('vehicle-list');
        const filtered = vehicles.filter(v => activeFilters[v.type]);
        
        // Sort by route
        filtered.sort((a, b) => a.route.localeCompare(b.route, undefined, {numeric: true}));

        list.innerHTML = filtered.map(v => `
            <div class="vehicle-item ${selectedId === v.id ? 'selected' : ''}" onclick="selectVehicle('${v.id}')">
                <div class="vehicle-icon icon-${v.type.toLowerCase()}">
                    ${v.type === 'BUS' ? '🚌' : v.type === 'TRAIN' ? '🚆' : '⛴️'}
                </div>
                <div class="vehicle-info">
                    <div class="vehicle-route" style="color: #${v.color.replace('#','') || 'fff'}">Route ${v.route}</div>
                    <div class="vehicle-headsign">${v.headsign}</div>
                </div>
                <div class="vehicle-meta">
                    ${v.speed ? Math.round(v.speed * 3.6) + ' km/h' : ''}
                </div>
            </div>
        `).join('');
    }

    function updateMarkers() {
        const currentIds = new Set();
        
        vehicles.forEach(v => {
            if (!activeFilters[v.type]) return;
            currentIds.add(v.id);

            if (markers[v.id]) {
                // Update position
                markers[v.id].setLngLat([v.lon, v.lat]);
                // Update rotation if element exists
                const el = markers[v.id].getElement();
                el.style.transform = `rotate(${v.heading || 0}deg)`;
            } else {
                // Create new marker
                const el = document.createElement('div');
                el.className = 'marker';
                el.style.width = '24px';
                el.style.height = '24px';
                el.style.display = 'flex';
                el.style.alignItems = 'center';
                el.style.justifyContent = 'center';
                el.style.fontSize = '18px';
                el.style.transition = 'all 0.3s ease';
                el.innerHTML = v.type === 'BUS' ? '🚌' : v.type === 'TRAIN' ? '🚆' : '⛴️';
                el.style.filter = `drop-shadow(0 0 5px ${v.color})`;
                
                if (v.heading) el.style.transform = `rotate(${v.heading}deg)`;

                const marker = new mapboxgl.Marker(el)
                    .setLngLat([v.lon, v.lat])
                    .addTo(map);
                
                el.addEventListener('click', (e) => {
                    e.stopPropagation();
                    selectVehicle(v.id);
                });

                markers[v.id] = marker;
            }
        });

        // Remove old markers
        Object.keys(markers).forEach(id => {
            if (!currentIds.has(id)) {
                markers[id].remove();
                delete markers[id];
            }
        });
    }

    function selectVehicle(id) {
        selectedId = id;
        const vehicle = vehicles.find(v => v.id === id);
        if (!vehicle) return;

        // Update UI
        renderList();
        
        // Show detail panel
        const panel = document.getElementById('detail-panel');
        panel.classList.add('visible');
        
        document.getElementById('det-route').textContent = `Route ${vehicle.route}`;
        document.getElementById('det-route').style.color = `#${vehicle.color.replace('#','')}`;
        document.getElementById('det-head').textContent = `Towards ${vehicle.headsign}`;
        document.getElementById('det-speed').textContent = vehicle.speed ? Math.round(vehicle.speed * 3.6) + ' km/h' : '—';
        document.getElementById('det-heading').textContent = vehicle.heading ? vehicle.heading + '°' : '—';
        document.getElementById('det-id').textContent = vehicle.id;
        document.getElementById('det-coords').textContent = `${vehicle.lat.toFixed(5)}, ${vehicle.lon.toFixed(5)}`;

        // Fly to marker
        map.flyTo({
            center: [vehicle.lon, vehicle.lat],
            zoom: 15,
            speed: 0.8
        });
    }

    function closeDetail() {
        document.getElementById('detail-panel').classList.remove('visible');
        selectedId = null;
        renderList();
    }

    window.onload = initMap;
</script>

</body>
</html>
